name: Snapshot Tests

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]
    branches: [master]
  push:
    branches: [master]

permissions:
  checks: write
  contents: write
  pull-requests: write

jobs:
  snapshot-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout baselines
        uses: actions/checkout@v4
        with:
          ref: snapshot-baselines
          path: .snapshot-baselines

      - name: Select Xcode
        run: |
          # Use the latest Xcode 26.x to match Bitrise CI environment
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            # Fall back to latest available Xcode
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Create simulator
        run: |
          # Create an iPhone 12 mini with the available iOS runtime
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for r in reversed(data['runtimes']):
              if 'iOS' in r['name'] and r['isAvailable']:
                  print(r['identifier'])
                  sys.exit(0)
          ")
          echo "Using runtime: $RUNTIME"
          xcrun simctl create "iPhone 12 mini" "com.apple.CoreSimulator.SimDeviceType.iPhone-12-mini" "$RUNTIME"

      - name: Run snapshot tests (record mode)
        run: |
          # Record mode causes all tests to "fail" (expected — they report
          # "Reference image is now saved"). We ignore the exit code here
          # and rely on the diff step to determine actual pass/fail.
          ruby ci_scripts/snapshots.rb --record --ci || true

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Collect recorded snapshots
        run: |
          mkdir -p recorded-snapshots
          RECORD_DIR="${TMPDIR:-/tmp}snapshot-records"
          if [ -d "$RECORD_DIR" ]; then
            find "$RECORD_DIR" -name "*.png" | while read f; do
              rel="${f#$RECORD_DIR/}"
              mkdir -p "recorded-snapshots/$(dirname "$rel")"
              cp "$f" "recorded-snapshots/$rel"
            done
          else
            echo "::warning::No recorded snapshots found at $RECORD_DIR"
          fi

      - name: Generate diff report
        id: diff
        env:
          SNAPSHOT_MANIFEST: snapshot-deploy/manifest.txt
        run: |
          chmod +x SnapshotTool/scripts/generate_diff_report.sh
          if ./SnapshotTool/scripts/generate_diff_report.sh \
              recorded-snapshots .snapshot-baselines snapshot-deploy; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy report to snapshot-reports branch
        if: steps.diff.outputs.has_changes == 'true'
        id: deploy
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPORT_PATH="pr-${PR_NUMBER}"
          BASE_URL="https://raw.githubusercontent.com/${{ github.repository }}/snapshot-reports/${REPORT_PATH}"
          REPORT_HTML_URL="https://htmlpreview.github.io/?https://raw.githubusercontent.com/${{ github.repository }}/snapshot-reports/${REPORT_PATH}/index.html"

          # Fetch or create snapshot-reports branch
          git fetch origin snapshot-reports --depth=1 2>/dev/null || true
          if git rev-parse origin/snapshot-reports >/dev/null 2>&1; then
            git worktree add reports-deploy -B snapshot-reports origin/snapshot-reports
          else
            git worktree add --detach reports-deploy
            cd reports-deploy
            git checkout --orphan snapshot-reports
            git rm -rf . > /dev/null 2>&1 || true
            git commit --allow-empty -m "Init snapshot-reports"
            cd ..
          fi

          # Copy report to the PR-specific path
          rm -rf "reports-deploy/${REPORT_PATH}"
          mkdir -p "reports-deploy/${REPORT_PATH}"
          cp -r snapshot-deploy/* "reports-deploy/${REPORT_PATH}/"

          # Push (retry on conflict from concurrent PRs)
          cd reports-deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Snapshot report for PR #${PR_NUMBER}" || echo "No changes"
          for i in 1 2 3; do
            git push origin snapshot-reports && break
            git pull --rebase origin snapshot-reports
          done

          echo "url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "report_url=$REPORT_HTML_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $BASE_URL"

      - name: Post PR comment
        if: steps.diff.outputs.has_changes == 'true' && steps.deploy.outputs.url && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x SnapshotTool/scripts/post_pr_comment.sh
          export GITHUB_REPOSITORY="${{ github.repository }}"
          export GITHUB_TOKEN="$GH_TOKEN"
          export SNAPSHOT_REPORT_URL="${{ steps.deploy.outputs.report_url }}"
          ./SnapshotTool/scripts/post_pr_comment.sh \
            snapshot-deploy/manifest.txt \
            recorded-snapshots \
            "${{ steps.deploy.outputs.url }}" \
            "${{ github.event.pull_request.number }}"

      - name: Check for approval label
        if: github.event_name == 'pull_request'
        id: label
        run: |
          if echo '${{ toJSON(github.event.pull_request.labels.*.name) }}' | grep -q "snapshot changes approved"; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if snapshots changed without label
        if: |
          github.event_name == 'pull_request' &&
          steps.diff.outputs.has_changes == 'true' &&
          steps.label.outputs.approved == 'false'
        run: |
          echo "::error::Snapshot changes detected. Review the diff report and add the 'snapshot changes approved' label to acknowledge."
          echo "View diff report: ${{ steps.deploy.outputs.url }}"
          exit 1


      - name: Upload recorded snapshots (artifact backup)
        if: steps.diff.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: recorded-snapshots
          path: recorded-snapshots/
          retention-days: 14

      - name: Update baselines on merge to master
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          cd .snapshot-baselines
          rm -rf *
          cp -r ../recorded-snapshots/* . 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update baselines from ${{ github.sha }}" || echo "No changes"
          git push origin snapshot-baselines

name: Snapshot Tests

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]
    branches: [master]
  push:
    branches: [master]

permissions:
  checks: write
  contents: write
  pull-requests: write

jobs:
  snapshot-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout baselines
        uses: actions/checkout@v4
        with:
          ref: snapshot-baselines
          path: .snapshot-baselines

      - name: Select Xcode 16.4
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.4*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Install iOS 16.4 runtime
        run: |
          if ! xcrun simctl list runtimes | grep -q "iOS 16.4"; then
            brew install xcodes
            xcodes runtimes install "iOS 16.4"
          fi

      - name: Create simulator
        run: |
          xcrun simctl create "iPhone 12 mini" \
            "com.apple.CoreSimulator.SimDeviceType.iPhone-12-mini" \
            "com.apple.CoreSimulator.SimRuntime.iOS-16-4"

      - name: Run snapshot tests (record mode)
        run: ruby ci_scripts/snapshots.rb --record --ci

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Collect recorded snapshots
        run: |
          mkdir -p recorded-snapshots
          RECORD_DIR="/tmp/snapshot-records_64"
          if [ ! -d "$RECORD_DIR" ]; then
            echo "::error::No recorded snapshots found at $RECORD_DIR"
            exit 1
          fi
          find "$RECORD_DIR" -name "*.png" | while read f; do
            rel="${f#$RECORD_DIR/}"
            mkdir -p "recorded-snapshots/$(dirname "$rel")"
            cp "$f" "recorded-snapshots/$rel"
          done
          COUNT=$(find recorded-snapshots -name '*.png' | wc -l | xargs)
          echo "Collected $COUNT snapshots"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::Snapshot recording produced no images"
            exit 1
          fi

      - name: Generate diff report
        id: diff
        run: |
          if ruby SnapshotTool/scripts/snapshot_tool.rb generate_diff \
              --manifest snapshot-deploy/manifest.txt \
              recorded-snapshots .snapshot-baselines snapshot-deploy; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy report to snapshot-reports branch
        if: steps.diff.outputs.has_changes == 'true'
        id: deploy
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPORT_PATH="pr-${PR_NUMBER}"
          BASE_URL="https://raw.githubusercontent.com/${{ github.repository }}/snapshot-reports/${REPORT_PATH}"
          REPORT_HTML_URL="https://htmlpreview.github.io/?https://raw.githubusercontent.com/${{ github.repository }}/snapshot-reports/${REPORT_PATH}/index.html"

          # Fetch or create snapshot-reports branch
          git fetch origin snapshot-reports --depth=1 2>/dev/null || true
          if git rev-parse origin/snapshot-reports >/dev/null 2>&1; then
            git worktree add reports-deploy -B snapshot-reports origin/snapshot-reports
          else
            git worktree add --detach reports-deploy
            cd reports-deploy
            git checkout --orphan snapshot-reports
            git rm -rf . > /dev/null 2>&1 || true
            git commit --allow-empty -m "Init snapshot-reports"
            cd ..
          fi

          # Copy report to the PR-specific path
          rm -rf "reports-deploy/${REPORT_PATH}"
          mkdir -p "reports-deploy/${REPORT_PATH}"
          cp -r snapshot-deploy/* "reports-deploy/${REPORT_PATH}/"

          # Push (retry on conflict from concurrent PRs)
          cd reports-deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Snapshot report for PR #${PR_NUMBER}" || echo "No changes"
          for i in 1 2 3; do
            git push origin snapshot-reports && break
            git pull --rebase origin snapshot-reports
          done

          echo "url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "report_url=$REPORT_HTML_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $BASE_URL"

      - name: Post PR comment
        if: steps.diff.outputs.has_changes == 'true' && steps.deploy.outputs.url && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAPSHOT_REPORT_URL: ${{ steps.deploy.outputs.report_url }}
        run: |
          GITHUB_TOKEN="$GH_TOKEN" GITHUB_REPOSITORY="${{ github.repository }}" \
          ruby SnapshotTool/scripts/snapshot_tool.rb post_pr_comment \
            snapshot-deploy/manifest.txt \
            recorded-snapshots \
            "${{ steps.deploy.outputs.url }}" \
            "${{ github.event.pull_request.number }}"

      - name: Remove snapshot comment if no changes
        if: steps.diff.outputs.has_changes == 'false' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            for (const c of comments.data) {
              if (c.body && c.body.includes('Snapshot Changes Detected')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

      - name: Check for approval label
        if: github.event_name == 'pull_request'
        id: label
        run: |
          if echo '${{ toJSON(github.event.pull_request.labels.*.name) }}' | grep -q "snapshot changes approved"; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if snapshots changed without label
        if: |
          github.event_name == 'pull_request' &&
          steps.diff.outputs.has_changes == 'true' &&
          steps.label.outputs.approved == 'false'
        run: |
          echo "::error::Snapshot changes detected. Review the diff report and add the 'snapshot changes approved' label to acknowledge."
          echo "View diff report: ${{ steps.deploy.outputs.url }}"
          exit 1


      - name: Upload recorded snapshots (artifact backup)
        if: steps.diff.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: recorded-snapshots
          path: recorded-snapshots/
          retention-days: 14

      - name: Update baselines on merge to master
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          cd .snapshot-baselines
          rm -rf *
          cp -r ../recorded-snapshots/* . 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update baselines from ${{ github.sha }}" || echo "No changes"
          git push origin snapshot-baselines
